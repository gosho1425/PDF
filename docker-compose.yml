# ─────────────────────────────────────────────────────────────────────────────
# PaperLens – Docker Compose configuration
#
# Services:
#   - db: PostgreSQL 15
#   - redis: Redis 7 (Celery broker + result backend)
#   - api: FastAPI backend
#   - worker: Celery worker (PDF parsing + LLM extraction)
#   - flower: Celery task monitor UI (dev only)
#   - frontend: Next.js app
#
# FOLDER-BASED INGESTION
#   Set HOST_PAPER_DIR in your .env to the folder on your HOST machine that
#   contains the PDF files you want to ingest.  The folder is mounted
#   read-only at /ingest inside the api and worker containers.
#
#   IMPORTANT — Windows path rules for .env:
#     1. Use backslashes OR forward slashes — both work.
#     2. NO inline comments after the path — Docker Compose includes everything
#        after the = sign up to end-of-line as part of the value.
#        WRONG:  HOST_PAPER_DIR=C:\papers   # my PDFs
#        RIGHT:  HOST_PAPER_DIR=C:\papers
#     3. NO trailing spaces after the path.
#     4. Also add: COMPOSE_CONVERT_WINDOWS_PATHS=1
#        This tells Docker Compose to convert Windows drive-letter paths
#        (C:\...) automatically. See .env.example.
#
#   Windows examples (in .env):
#     HOST_PAPER_DIR=C:\Users\Alice\Documents\papers
#     HOST_PAPER_DIR=D:\research\pdfs
#
#   macOS / Linux examples:
#     HOST_PAPER_DIR=/home/alice/papers
#     HOST_PAPER_DIR=/Volumes/Data/papers
#
# TROUBLESHOOTING — If pdf-db-1 fails to start:
#   1. Make sure POSTGRES_PASSWORD is set in .env (not empty, not placeholder)
#   2. If you changed the password after a first run, clear the volume:
#        docker compose down -v   (WARNING: deletes all data)
#        docker compose up -d
#   3. Run the diagnostics helper:
#        Windows PowerShell : .\scripts\check-env.ps1
#        macOS / Linux      : bash scripts/check-env.sh
#
# SECURITY: Never commit .env to git. Use .env.example as a template.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paperlens}
      POSTGRES_USER: ${POSTGRES_USER:-paperlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?❌ POSTGRES_PASSWORD is not set. Copy .env.example to .env and fill in POSTGRES_PASSWORD.}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      # pg_isready returns 0 only when the server is accepting connections.
      # Generous retries (20 × 5 s = 100 s) handle slow first-boot on Windows.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperlens} -d ${POSTGRES_DB:-paperlens}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Database Migration (runs once on startup) ───────────────────────────────
  # alembic/env.py already contains a wait_for_db() loop (up to 30 × 2 s = 60 s)
  # that blocks until Postgres accepts real queries (not just a TCP ping).
  # The migration DDL is idempotent: ENUM types use DO/EXCEPTION blocks so
  # re-runs after a partial failure succeed without "type already exists" errors.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "
        echo '=== PaperLens: running Alembic migrations ===' &&
        alembic upgrade head &&
        echo '=== Migrations complete ==='
      "
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-paperlens}
      POSTGRES_USER: ${POSTGRES_USER:-paperlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?❌ POSTGRES_PASSWORD is not set. Copy .env.example to .env and fill in POSTGRES_PASSWORD.}
      # Expose log level so migration output is visible in docker compose logs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ANTHROPIC_API_KEY: ""
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-paperlens}
      POSTGRES_USER: ${POSTGRES_USER:-paperlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?❌ POSTGRES_PASSWORD is not set. Copy .env.example to .env and fill in POSTGRES_PASSWORD.}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      DATA_DIR: /app/data
      # Container-side ingestion folder (host folder is mounted below)
      INGEST_DIR: ${INGEST_DIR:-/ingest}
      # Include all common origins so the browser can reach the API regardless
      # of which port the user opened. The list is comma-separated.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:8000,http://127.0.0.1:3000,http://127.0.0.1:8000}
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - paper_data:/app/data
      # ── Host PDF folder (read-only) ──────────────────────────────────────────
      # Long-form bind mount syntax avoids Windows drive-letter path ambiguity.
      # The short form  "C:\path:/ingest"  can be mis-parsed as named-volume:path.
      # Long form always works on Windows, macOS, and Linux.
      #
      # Set HOST_PAPER_DIR in .env — NO inline comments, NO trailing spaces.
      #   Windows : HOST_PAPER_DIR=C:\Users\Alice\Documents\papers
      #   macOS   : HOST_PAPER_DIR=/home/alice/papers
      #
      # FALLBACK: if HOST_PAPER_DIR is not set, ./data/ingest (already in repo)
      # is used. The UI will show "Fallback (empty)" with instructions.
      #
      # create_host_path: true  → Docker will create the source directory on the
      # host if it does not exist (avoids "bind source path does not exist" error).
      - type: bind
        source: ${HOST_PAPER_DIR:-./data/ingest}
        target: /ingest
        read_only: true
        bind:
          create_host_path: true
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.workers.celery_app:celery_app worker
      --loglevel=info
      --queues=parse,extract,pipeline
      --concurrency=2
      --max-tasks-per-child=50
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-paperlens}
      POSTGRES_USER: ${POSTGRES_USER:-paperlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?❌ POSTGRES_PASSWORD is not set. Copy .env.example to .env and fill in POSTGRES_PASSWORD.}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      DATA_DIR: /app/data
      # Container-side ingestion folder (host folder is mounted below)
      INGEST_DIR: ${INGEST_DIR:-/ingest}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - paper_data:/app/data
      # Same long-form bind mount as the api service (worker needs to read PDFs)
      - type: bind
        source: ${HOST_PAPER_DIR:-./data/ingest}
        target: /ingest
        read_only: true
        bind:
          create_host_path: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Celery Flower (task monitoring UI) ─────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.workers.celery_app:celery_app flower
      --port=5555
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      - redis

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  paper_data:
