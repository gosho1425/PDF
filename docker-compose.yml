# ─────────────────────────────────────────────────────────────────────────────
# PaperLens – Docker Compose configuration
#
# Services:
#   - db: PostgreSQL 15
#   - redis: Redis 7 (Celery broker + result backend)
#   - api: FastAPI backend
#   - worker: Celery worker (PDF parsing + LLM extraction)
#   - flower: Celery task monitor UI (dev only)
#   - frontend: Next.js app
#
# FOLDER-BASED INGESTION
#   Set HOST_PAPER_DIR in your .env to the folder on your HOST machine that
#   contains the PDF files you want to ingest.  The folder is mounted
#   read-only at /ingest inside the api and worker containers.
#
#   Windows examples (in .env):
#     HOST_PAPER_DIR=C:\Users\Alice\Documents\papers
#     HOST_PAPER_DIR=D:\research\pdfs
#
#   macOS / Linux examples:
#     HOST_PAPER_DIR=/home/alice/papers
#     HOST_PAPER_DIR=/Volumes/Data/papers
#
#   Docker Desktop for Windows automatically converts Windows paths to the
#   correct format; no extra escaping is required.
#
# TROUBLESHOOTING — If pdf-db-1 fails to start:
#   1. Make sure POSTGRES_PASSWORD is set in .env (not empty, not placeholder)
#   2. If you changed the password after a first run, clear the volume:
#        docker compose down -v   (WARNING: deletes all data)
#        docker compose up -d
#   3. Run the diagnostics helper:
#        Windows PowerShell : .\scripts\check-env.ps1
#        macOS / Linux      : bash scripts/check-env.sh
#
# SECURITY: Never commit .env to git. Use .env.example as a template.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paperlens}
      POSTGRES_USER: ${POSTGRES_USER:-paperlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?❌ POSTGRES_PASSWORD is not set. Copy .env.example to .env and fill in POSTGRES_PASSWORD.}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      # pg_isready returns 0 only when the server is accepting connections.
      # Generous retries (20 × 5 s = 100 s) handle slow first-boot on Windows.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperlens} -d ${POSTGRES_DB:-paperlens}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Database Migration (runs once on startup) ───────────────────────────────
  # Uses a retry loop so transient connection blips don't fail the migration.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Retry loop: attempt alembic up to 5 times with a 5-second pause between
    # attempts. This handles the case where the DB accepts the healthcheck ping
    # but the auth system isn't ready yet (common on first-boot Windows).
    command: >
      sh -c "
        echo 'Waiting for database to be fully ready...' &&
        for i in 1 2 3 4 5; do
          alembic upgrade head && echo 'Migrations complete' && exit 0;
          echo \"Migration attempt $$i failed, retrying in 5s...\";
          sleep 5;
        done;
        echo 'ERROR: All migration attempts failed.' && exit 1
      "
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-paperlens}
      POSTGRES_USER: ${POSTGRES_USER:-paperlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?❌ POSTGRES_PASSWORD is not set. Copy .env.example to .env and fill in POSTGRES_PASSWORD.}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-paperlens}
      POSTGRES_USER: ${POSTGRES_USER:-paperlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?❌ POSTGRES_PASSWORD is not set. Copy .env.example to .env and fill in POSTGRES_PASSWORD.}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      DATA_DIR: /app/data
      # Container-side ingestion folder (host folder is mounted below)
      INGEST_DIR: ${INGEST_DIR:-/ingest}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - paper_data:/app/data
      # ── Host PDF folder (read-only) ──────────────────────────────────────────
      # Set HOST_PAPER_DIR in .env to your host folder path.
      # Windows: HOST_PAPER_DIR=C:\Users\Alice\Documents\papers
      # macOS:   HOST_PAPER_DIR=/home/alice/papers
      # If HOST_PAPER_DIR is not set, falls back to ./data/ingest (empty local folder).
      - ${HOST_PAPER_DIR:-./data/ingest}:/ingest:ro
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.workers.celery_app:celery_app worker
      --loglevel=info
      --queues=parse,extract,pipeline
      --concurrency=2
      --max-tasks-per-child=50
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-paperlens}
      POSTGRES_USER: ${POSTGRES_USER:-paperlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?❌ POSTGRES_PASSWORD is not set. Copy .env.example to .env and fill in POSTGRES_PASSWORD.}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      DATA_DIR: /app/data
      # Container-side ingestion folder (host folder is mounted below)
      INGEST_DIR: ${INGEST_DIR:-/ingest}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - paper_data:/app/data
      # Same read-only mount so the worker can read PDFs during scan_folder
      - ${HOST_PAPER_DIR:-./data/ingest}:/ingest:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Celery Flower (task monitoring UI) ─────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.workers.celery_app:celery_app flower
      --port=5555
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      - redis

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  paper_data:
