version: "3.9"
# Development override: mounts source code for hot-reload

services:
  api:
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - paper_data:/app/data
    environment:
      DEBUG: "true"
      LOG_FORMAT: console
      ENVIRONMENT: development

  worker:
    command: >
      celery -A app.workers.celery_app:celery_app worker
      --loglevel=debug --queues=parse,extract,pipeline --concurrency=1
    volumes:
      - ./backend:/app
      - paper_data:/app/data
    environment:
      DEBUG: "true"
      LOG_FORMAT: console

  # In dev, run Next.js with hot-reload instead of the built image
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
